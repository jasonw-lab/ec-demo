name: Deploy Payment Service

on:
  push:
    branches: [develop]
    paths:
      - "apps/services/payment-service/**"
      - "back.sh"
      - "platform/docker/demo/Dockerfile.payment-service"
      - "platform/docker/demo/docker-compose-demo-app.yml"
      - ".github/workflows/deploy-payment-service.yml"
      - ".github/workflows/_deploy-app.yml"
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-app.yml
    with:
      app_name: payment-service
      deploy_target: backend
      service_name: payment-service
    secrets: inherit
