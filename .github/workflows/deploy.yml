name: Deploy VPS

on:
  push:
    branches: [ develop ]
    paths:
      - 'apps/web/**'
      - 'front.sh'
      - 'apps/services/account-service/**'
      - 'apps/services/order-service/**'
      - 'apps/services/storage-service/**'
      - 'apps/services/payment-service/**'
      - 'apps/services/es-service/**'
      - 'apps/bff/**'
      - 'back.sh'
      - 'platform/docker/demo/Dockerfile.*'
      - 'platform/docker/demo/docker-compose-demo-app.yml'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Check for frontend changes
        id: check_frontend
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -Eq "^(apps/web/|front\.sh$)"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for backend changes
        id: check_backend
        run: |
          CHANGED_FILES="$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} || true)"

          declare -a SERVICES=()

          add_service() {
            local svc="$1"
            for existing in "${SERVICES[@]:-}"; do
              if [[ "$existing" == "$svc" ]]; then
                return
              fi
            done
            SERVICES+=("$svc")
          }

          if grep -Eq '^apps/services/account-service/|^platform/docker/demo/Dockerfile\.account-service$' <<< "$CHANGED_FILES"; then
            add_service "account-service"
          fi

          if grep -Eq '^apps/services/order-service/|^platform/docker/demo/Dockerfile\.order-service$' <<< "$CHANGED_FILES"; then
            add_service "order-service"
          fi

          if grep -Eq '^apps/services/storage-service/|^platform/docker/demo/Dockerfile\.storage-service$' <<< "$CHANGED_FILES"; then
            add_service "storage-service"
          fi

          if grep -Eq '^apps/services/payment-service/|^platform/docker/demo/Dockerfile\.payment-service$' <<< "$CHANGED_FILES"; then
            add_service "payment-service"
          fi

          if grep -Eq '^apps/services/es-service/|^platform/docker/demo/Dockerfile\.es-service$' <<< "$CHANGED_FILES"; then
            add_service "es-service"
          fi

          if grep -Eq '^apps/bff/|^platform/docker/demo/Dockerfile\.bff$' <<< "$CHANGED_FILES"; then
            add_service "bff"
          fi

          if grep -q '^platform/docker/demo/docker-compose-demo-app\.yml$' <<< "$CHANGED_FILES"; then
            add_service "account-service"
            add_service "order-service"
            add_service "storage-service"
            add_service "payment-service"
            add_service "es-service"
            add_service "bff"
          fi

          if [[ ${#SERVICES[@]} -gt 0 ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "services=${SERVICES[*]}" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "services=" >> $GITHUB_OUTPUT
          fi

      - name: Set build arguments
        id: changes
        run: |
          BUILD_ARGS=""
          if [[ "${{ steps.check_frontend.outputs.changed }}" == "true" ]]; then
            BUILD_ARGS="frontend"
          fi
          if [[ "${{ steps.check_backend.outputs.changed }}" == "true" ]]; then
            if [[ -n "$BUILD_ARGS" ]]; then
              BUILD_ARGS="$BUILD_ARGS backend"
            else
              BUILD_ARGS="backend"
            fi
          fi
          echo "build_args=$BUILD_ARGS" >> $GITHUB_OUTPUT

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            echo "Working directory: ${{ secrets.PROJECT_PATH }}"
            cd ${{ secrets.PROJECT_PATH }}
            BEFORE_SHA=$(git rev-parse HEAD)
            git pull
            AFTER_SHA=$(git rev-parse HEAD)

            # Execute front.sh if there are frontend changes
            if [[ "${{ steps.check_frontend.outputs.changed }}" == "true" ]]; then
              bash ./front.sh
            fi

            # Execute back.sh if there are backend changes
            if [[ "${{ steps.check_backend.outputs.changed }}" == "true" ]]; then
              SERVICES="${{ steps.check_backend.outputs.services }}"
              echo "Redeploying backend services: $SERVICES"
              # shellcheck disable=SC2086
              bash ./back.sh $SERVICES
            fi
