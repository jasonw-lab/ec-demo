name: Deploy BFF

on:
  push:
    branches: [develop]
    paths:
      - "apps/bff/**"
      - "back.sh"
      - "platform/docker/demo/Dockerfile.bff"
      - "platform/docker/demo/docker-compose-demo-app.yml"
      - ".github/workflows/deploy-bff.yml"
      - ".github/workflows/_deploy-app.yml"
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-app.yml
    with:
      app_name: bff
      deploy_target: backend
      service_name: bff
    secrets: inherit
