# Redis configuration for ec-demo
# Minimal config for local development

# Network
bind 0.0.0.0
port 6379
protected-mode no

# General
daemonize no
databases 16

# Persistence (AOF disabled for dev)
appendonly no
save ""

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
